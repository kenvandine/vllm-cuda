name: build-release

# Builds self-contained vllm-server bundles consumed by Lemonade's `vllm`
# backend (cuda device). No vLLM code is forked: at build time the official
# `vllm` PyPI wheel is installed (which pulls in the official CUDA-enabled
# `torch`/`torchvision`/`torchaudio` wheels as normal dependencies -- no
# AMD-style extra index needed) and a thin `bin/vllm-server` launcher shim is
# added. See the README for the full rationale.
#
# One asset is published per HOST ARCHITECTURE (not per GPU generation):
#   vllm-server-<tag>-linux-x64.tar.gz
#   vllm-server-<tag>-linux-arm64.tar.gz
#
# Each asset ships the wheel exactly as PyPI publishes it -- every native
# cubin torch/vllm embed for that host arch (sm_75/80/86/90/100/120 on
# x86_64; sm_80/90/100/120 on arm64), plus PTX for forward compatibility with
# newer GPUs (e.g. sm_89/sm_121, which have no native cubin in either wheel
# as of torch 2.11.0 and fall back to same-generation PTX, JIT-compiled on
# first launch and cached afterward).
#
# Earlier prototypes of this repo tried to mirror llama.cpp's per-GPU-arch
# build matrix by pruning the fat wheel down to one target architecture with
# NVIDIA's nvprune. That does not work: nvprune requires an unlinked
# relocatable object (ET_REL, produced with `-rdc=true` before final linking)
# and refuses ("not relocatable") on the fully-linked shared libraries
# (ET_DYN) that PyPI wheels actually ship -- confirmed by reproducing the
# failure locally against a real torch wheel, not just a CI failure. A true
# per-arch build would mean compiling PyTorch and vLLM's CUDA kernels from
# source ourselves (unlike vllm-rocm, which repackages AMD's own prebuilt
# wheels and validates them on a real self-hosted GPU runner) -- multi-hour
# builds per target with no NVIDIA hardware in this org's CI to validate
# against. Given that cost/risk, this repo ships the unmodified fat wheel
# per host platform instead.
#
# STATUS: prototype. Not yet validated end-to-end on real NVIDIA hardware.
#
# TODO(windows-cuda): add a windows-x64 matrix leg.

on:
  schedule:
    - cron: '47 6 * * *'   # daily -- poll PyPI for new vllm releases
  workflow_dispatch:
    inputs:
      vllm_version:
        description: 'vllm version (empty = latest on PyPI)'
        required: false
        default: ''
      force:
        description: 'Rebuild even if the release already exists'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      need_build: ${{ steps.resolve.outputs.need_build }}
    steps:
      - name: Resolve version and tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.vllm_version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -fsSL https://pypi.org/pypi/vllm/json | jq -r '.info.version')
          fi
          TAG="vllm${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

          NEED=true
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            if [ "${{ github.event.inputs.force }}" != "true" ]; then
              NEED=false
            fi
          fi
          echo "need_build=$NEED" >> "$GITHUB_OUTPUT"

          echo "Resolved vllm $VERSION -> tag $TAG (need_build=$NEED)"

  # Discrete NVIDIA GPUs in a standard x86_64 PC/server (Turing through
  # Blackwell). No per-arch split -- see header comment.
  build-x64:
    needs: check
    if: needs.check.outputs.need_build == 'true'
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ needs.check.outputs.version }}
      TAG: ${{ needs.check.outputs.tag }}
      ASSET_PLATFORM: linux-x64
      PBS_TRIPLE: x86_64-unknown-linux-gnu
      PBS_PY: 3.12.13
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-vllm-cuda
        with:
          version: ${{ env.VERSION }}
          tag: ${{ env.TAG }}
          asset_platform: ${{ env.ASSET_PLATFORM }}
          pbs_triple: ${{ env.PBS_TRIPLE }}
          pbs_py: ${{ env.PBS_PY }}

  # Grace-CPU-paired NVIDIA SoC/superchip platforms (GH200, GB200, GB10/Thor)
  # -- ARM64 hosts with no x86_64 counterpart for some of them (GB10/Thor).
  build-arm64:
    needs: check
    if: needs.check.outputs.need_build == 'true'
    runs-on: ubuntu-22.04-arm
    env:
      VERSION: ${{ needs.check.outputs.version }}
      TAG: ${{ needs.check.outputs.tag }}
      ASSET_PLATFORM: linux-arm64
      PBS_TRIPLE: aarch64-unknown-linux-gnu
      PBS_PY: 3.12.13
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-vllm-cuda
        with:
          version: ${{ env.VERSION }}
          tag: ${{ env.TAG }}
          asset_platform: ${{ env.ASSET_PLATFORM }}
          pbs_triple: ${{ env.PBS_TRIPLE }}
          pbs_py: ${{ env.PBS_PY }}
